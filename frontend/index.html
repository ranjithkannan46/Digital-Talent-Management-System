<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Talent Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
    <style>
      /* ── Critical styles: loaded BEFORE any JS ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: #061409;
        color: #e2e8f0;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

      /* ── App shell: prevents sidebar layout flash ── */
      .app-shell {
        display: flex;
        min-height: 100vh;
      }
      .sidebar {
        width: 215px;
        flex-shrink: 0;
        background: #10141e;
        border-right: 1px solid rgba(255,255,255,.055);
        position: fixed;
        top: 0; left: 0; bottom: 0;
        z-index: 200;
      }
      .app-main {
        flex: 1;
        margin-left: 215px;
        min-height: 100vh;
        background: #0c0f1a;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        position: sticky;
        top: 0;
        height: 52px;
        background: rgba(12,15,26,.95);
        border-bottom: 1px solid rgba(255,255,255,.05);
        z-index: 150;
      }
      .app-content {
        flex: 1;
        padding: 1.5rem 1.75rem;
      }

      /* ── Login page: green background ── */
      body.auth-page {
        background: #061409;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      /* ── Loading state ── */
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0c0f1a;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
